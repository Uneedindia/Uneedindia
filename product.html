<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product , UneedIndia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Karla:wght@300;400;500;600&family=Allura&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="site-header"></header>

<section style="padding:3rem 0">
  <div class="container">
    <div id="pd-root"></div>
  </div>
</section>

<footer class="site-footer"></footer>
<div class="sticky-cta"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const id = new URLSearchParams(location.search).get("id");
  const p = getProduct(id);
  const root = document.getElementById("pd-root");
  if (!p){
    root.innerHTML = `<div class="page-head"><h1>Piece not found</h1><p><a href="shop.html" style="color:var(--rose)">Browse the shelf →</a></p></div>`;
  } else {
    document.title = `${p.name} , UneedIndia`;
    root.innerHTML = `
      <a href="javascript:history.back()" class="btn btn-outline" style="margin-bottom:2rem">← Go back</a>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center" class="pd-simple">
        <img src="${IMG(p.image)}" alt="${p.name}" style="width:100%;border-radius:6px;cursor:zoom-in" id="pd-img">
        <div>
          <h1 style="font-family:var(--font-display);font-size:3rem;line-height:1.1;margin-bottom:1rem">${p.name}</h1>
          <a href="shop.html" class="btn btn-outline" style="margin-top:1rem">← Back to shop</a>
        </div>
      </div>`;
    document.getElementById("pd-img").onclick = () => openLightbox(IMG(p.image), p.name);
  }
</script>
<style>
  @media (max-width: 720px){ .pd-simple{ grid-template-columns: 1fr !important; } }
</style>
</body>
</html>
