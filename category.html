<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Category , UneedIndia</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Karla:wght@300;400;500;600&family=Allura&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<header class="site-header"></header>

<section class="bg-gradient-blush grain" style="padding:9rem 0 4rem">
 <div class="container-sm text-center reveal">
 <p class="eyebrow" id="cat-eyebrow">Collection</p>
 <h1 id="cat-name" style="font-size:4rem;margin-top:1rem;line-height:1.02"></h1>
 <p id="cat-tag" style="margin-top:1rem;color:var(--clay);font-family:var(--font-script);font-size:1.75rem"></p>
 </div>
</section>

<section class="section">
 <div class="container">
 <div class="prod-grid" id="cat-grid"></div>
 <p id="empty" class="text-center" style="display:none;color:var(--clay);padding:4rem 0">Nothing here yet. <a href="shop.html" style="color:var(--rose)">Browse everything →</a></p>
 </div>
</section>

<footer class="site-footer"></footer>
<div class="sticky-cta"></div>

<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
 const slug = new URLSearchParams(location.search).get("slug");
 const cat = CATEGORIES.find(c => c.slug === slug) || CATEGORIES[0];
 document.title = `${cat.name} , UneedIndia`;
 document.getElementById("cat-eyebrow").textContent = "The collection";
 document.getElementById("cat-name").textContent = cat.name;
 document.getElementById("cat-tag").textContent = cat.tagline;
 const items = PRODUCTS.filter(p => p.category === cat.slug);
 const g = document.getElementById("cat-grid");
 if (items.length === 0) document.getElementById("empty").style.display = "block";
 items.forEach(p => g.appendChild(renderProductCard(p)));
 setupReveal();
</script>
</body>
</html>
